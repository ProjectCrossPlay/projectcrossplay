name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      # Node 24 for the toolchain: pnpm 11 needs node:sqlite (Node >= 22), and
      # driver-android's appium-uiautomator2-server dependency needs
      # ^20.19.0 || ^22.12.0 || >=24.0.0 (see engines.node, all packages).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # build first: cross-package type resolution needs core's dist/ (topological order)
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      # Supply-chain gate (NFR-015): fail on high/critical advisories
      - run: pnpm audit --audit-level high
      # docs/api is generated from types (B-050/FR-090) and committed, not
      # built at publish time — this catches a public type changing without
      # regenerating it (fix: pnpm docs:api).
      - run: pnpm docs:api && git diff --exit-code -- docs/api

  # B-042: 3-browser matrix (FR-012) — runs the shared demo spec on every push/PR.
  web-demo:
    name: web demo (${{ matrix.browser }})
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Install via driver-web's own pinned playwright, not a bare `npx
      # playwright` (which would resolve an unrelated, unpinned version).
      - run: pnpm --filter @projectcrossplay/driver-web exec playwright install --with-deps ${{ matrix.browser }}
      - name: Start demo server
        working-directory: examples/demo-web
        run: nohup node server.mjs > server.log 2>&1 &
      - name: Wait for demo server
        run: for i in $(seq 1 20); do curl -sf http://127.0.0.1:4173/ >/dev/null && exit 0; sleep 0.5; done; echo "server never came up"; exit 1
      - name: Run demo spec
        working-directory: examples/demo-web
        run: pnpm exec crossplay test --target ${{ matrix.browser }}
      # FR-081: traces uploaded on failure
      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-web-${{ matrix.browser }}
          path: examples/demo-web/.crossplay/traces

  # B-042: Android emulator job (FR-080) — API 30 per NFR-006, matches the demo AVD.
  android-demo:
    name: android demo (API 30)
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # GH-hosted ubuntu runners ship the Android SDK + build-tools preinstalled
      # (ANDROID_HOME preset) — building the APK needs no emulator, so this
      # runs before the emulator step below.
      - name: Build Kotlin demo APK
        working-directory: examples/demo-android-kotlin
        run: ./gradlew assembleDebug -q --console=plain
      # Without this, /dev/kvm is root-only on GH-hosted runners and the
      # emulator silently falls back to software rendering — boots in
      # minutes instead of seconds and is too sluggish for the 30s
      # element-wait budget (observed: 331s boot, login test timeout).
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run demo spec on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          # android-emulator-runner runs each script line as its own shell
          # invocation, so a `cd` on its own line doesn't carry over — chain
          # with && on one line instead.
          script: cd examples/demo-web && pnpm exec crossplay test --target android-kotlin
      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-android
          path: examples/demo-web/.crossplay/traces

  # B-051 (G3): simulates a first-time user following docs/quickstart.md
  # against packed (not workspace-linked) packages in a directory outside the
  # monorepo — this is the only job that would have caught the .ts/.mts
  # config-loading bug (a bare `crossplay.config.ts` loads as CommonJS unless
  # the nearest package.json sets "type": "module", which `npm init -y`
  # never does; every other job runs inside this repo, where package.json
  # already sets "type": "module", masking the exact failure a new user hits).
  quickstart-smoke:
    name: quickstart smoke (fresh install)
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Pack publishable packages
        run: |
          mkdir -p /tmp/tarballs
          for pkg in core driver-web trace-viewer cli; do
            (cd packages/$pkg && pnpm pack --pack-destination /tmp/tarballs)
          done
      - name: Start demo server
        working-directory: examples/demo-web
        run: nohup node server.mjs > server.log 2>&1 &
      - name: Wait for demo server
        run: for i in $(seq 1 20); do curl -sf http://127.0.0.1:4173/ >/dev/null && exit 0; sleep 0.5; done; echo "server never came up"; exit 1
      - name: Follow the quickstart from a fresh project
        run: |
          mkdir -p /tmp/quickstart-smoke && cd /tmp/quickstart-smoke
          npm init -y >/dev/null
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.overrides = { '@projectcrossplay/trace-viewer': 'file:/tmp/tarballs/projectcrossplay-trace-viewer-0.1.0-dev.0.tgz' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install -D \
            @projectcrossplay/cli@file:/tmp/tarballs/projectcrossplay-cli-0.1.0-dev.0.tgz \
            @projectcrossplay/core@file:/tmp/tarballs/projectcrossplay-core-0.1.0-dev.0.tgz \
            @projectcrossplay/driver-web@file:/tmp/tarballs/projectcrossplay-driver-web-0.1.0-dev.0.tgz
          npx crossplay init
          test -f crossplay.config.mts # the scaffolded file must be unambiguously ESM
          npx crossplay doctor
          npx playwright install --with-deps chromium
          sed -i "s|http://localhost:3000|http://127.0.0.1:4173|" crossplay.config.mts
          node -e "
            const fs = require('fs');
            fs.writeFileSync('tests/example.spec.ts', [
              \"import { by, expect, test } from '@projectcrossplay/core/test';\",
              '',
              \"test('login flow', async ({ app }) => {\",
              \"  await app.fill(by.testId('username'), 'demo');\",
              \"  await app.fill(by.testId('password'), 'crossplay');\",
              \"  await app.tap(by.role('button', { name: 'Sign in' }));\",
              \"  expect(await app.getText(by.testId('greeting'))).toContain('Welcome back');\",
              '});',
              '',
            ].join('\n'));
          "
          npx crossplay test --target web

  # Flake farm (B-035) + soak/leak test (B-043) run nightly, not per-push —
  # see .github/workflows/nightly.yml.
