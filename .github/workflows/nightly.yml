name: Nightly
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  # B-035/NFR-001 pre-release gate: 0 failures in 50 consecutive runs.
  flake-farm-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @projectcrossplay/driver-web exec playwright install --with-deps chromium
      - name: Start demo server
        working-directory: examples/demo-web
        run: nohup node server.mjs > server.log 2>&1 &
      - name: Wait for demo server
        run: for i in $(seq 1 20); do curl -sf http://127.0.0.1:4173/ >/dev/null && exit 0; sleep 0.5; done; exit 1
      - run: node tools/flake-farm.mjs --target chromium --runs 50 --cwd examples/demo-web
      - name: Upload report + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake-report-web
          path: |
            flake-report-chromium.json
            examples/demo-web/.crossplay/traces

  # B-043/NFR-013/014: bounded-heap soak test, driver/dispose lifecycle in isolation.
  soak-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @projectcrossplay/driver-web exec playwright install --with-deps chromium
      - name: Start demo server
        working-directory: examples/demo-web
        run: nohup node server.mjs > server.log 2>&1 &
      - name: Wait for demo server
        run: for i in $(seq 1 20); do curl -sf http://127.0.0.1:4173/ >/dev/null && exit 0; sleep 0.5; done; exit 1
      - run: node --expose-gc tools/soak-test.mjs --target chromium --runs 40 --cwd examples/demo-web
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-report-web
          path: soak-report-chromium.json

  # Both nightly gates on the Android side, in one emulator boot.
  android-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build Kotlin demo APK
        working-directory: examples/demo-android-kotlin
        run: ./gradlew assembleDebug -q --console=plain
      # See ci.yml's android-demo job for why this is needed.
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Flake farm + soak test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: |
            node tools/flake-farm.mjs --target android-kotlin --runs 50 --cwd examples/demo-web
            node --expose-gc tools/soak-test.mjs --target android-kotlin --runs 30 --cwd examples/demo-web
      - name: Upload reports + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reports-android
          path: |
            flake-report-android-kotlin.json
            soak-report-android-kotlin.json
            examples/demo-web/.crossplay/traces
