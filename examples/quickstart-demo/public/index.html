<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossPlay Quickstart Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --error: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, var(--bg) 80%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 48px rgba(99, 102, 241, 0.1);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a5b4fc 0%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--error);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 24px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .success-view {
      display: none;
      text-align: center;
      animation: scaleUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      margin: 0 auto 24px auto;
    }

    .welcome-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .welcome-text {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 300;
      margin-bottom: 32px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleUp {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card" id="login-card">
      <div id="login-form-view">
        <div class="header">
          <div class="logo">CrossPlay</div>
          <div class="subtitle">Platform-Agnostic Test Automation</div>
        </div>

        <div class="error-msg" id="error-box" data-testid="login-error">
          Wrong username or password
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="username">Username</label>
            <input 
              type="text" 
              id="username" 
              class="form-control" 
              data-testid="username" 
              placeholder="Enter your username" 
              required
              autocomplete="off"
            >
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input 
              type="password" 
              id="password" 
              class="form-control" 
              data-testid="password" 
              placeholder="••••••••" 
              required
            >
          </div>

          <button type="submit" class="btn" data-testid="login-button">Sign in</button>
        </form>
      </div>

      <div class="success-view" id="success-view">
        <div class="success-icon">✓</div>
        <div class="welcome-title" id="welcome-greeting" data-testid="greeting">Welcome back!</div>
        <div class="welcome-text">You have successfully logged in using CrossPlay.</div>
        <button class="btn" onclick="logout()">Sign out</button>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');

      // Valid credentials for the quickstart demo
      if (usernameInput === 'demo' && passwordInput === 's3cret') {
        errorBox.style.display = 'none';
        document.getElementById('login-form-view').style.display = 'none';
        document.getElementById('welcome-greeting').innerText = `Welcome back, ${usernameInput}!`;
        document.getElementById('success-view').style.display = 'block';
      } else {
        errorBox.style.display = 'block';
      }
    }

    function logout() {
      document.getElementById('success-view').style.display = 'none';
      document.getElementById('login-form-view').style.display = 'block';
      document.getElementById('login-form').reset();
    }
  </script>
</body>
</html>
