<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CrossPlay Demo Shop</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { max-width: 420px; margin: 3rem auto; padding: 0 1rem; }
    input, button { font: inherit; padding: .5rem .75rem; margin: .25rem 0; display: block; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; }
    li { padding: .5rem; border-bottom: 1px solid #8884; cursor: pointer; list-style: none; }
    ul { padding: 0; }
    .error { color: #c0392b; }
    .hidden { display: none; }
    #spinner { opacity: .6; }
  </style>
</head>
<body>
  <main id="app"></main>
  <script src="app.js"></script>
</body>
</html>
